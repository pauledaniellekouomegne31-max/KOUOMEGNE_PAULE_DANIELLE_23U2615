<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoiffData — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/{{ url_for('static', filename='css/style.css')}}s"/>
</head>
<body class="page-login">

  <div class="login-wrap">
    <div class="login-logo">✦ CoiffData</div>
    <h2>Espace Administrateur</h2>
    <p class="login-hint">Accès restreint — entrez votre mot de passe.</p>

    {% if erreur %}
    <div class="alert-err">⚠ {{ erreur }}</div>
    {% endif %}

    <form method="POST" action="/login" class="login-form">
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autofocus/>
      </div>
      <button type="submit" class="btn-cta full">
        <span>Accéder au tableau de bord →</span>
      </button>
    </form>

    <a href="/" class="back-link">← Retour à l'accueil</a>
  </div>

</body>
</html>
